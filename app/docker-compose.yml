name: fleet

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fleet}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fleet}
      POSTGRES_DB: ${POSTGRES_DB:-fleet}
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-fleet} -d ${POSTGRES_DB:-fleet}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [fleet]

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [fleet]

  migrate:
    build:
      context: ..
      dockerfile: docker/api.Dockerfile
    image: fleet-api:local
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://fleet:fleet@postgres:5432/fleet}
    depends_on:
      postgres:
        condition: service_healthy
    command: ["alembic", "upgrade", "head"]
    restart: "no"
    networks: [fleet]

  api:
    image: fleet-api:local
    build:
      context: ..
      dockerfile: docker/api.Dockerfile
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://fleet:fleet@postgres:5432/fleet}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      CORS_ORIGINS: ${CORS_ORIGINS:-*}
      FLEET_SIZE: ${FLEET_SIZE:-500}
      GEN_RATE_HZ: ${GEN_RATE_HZ:-1.0}
      GEN_ENABLED: ${GEN_ENABLED:-true}
      BATCH_FLUSH_MS: ${BATCH_FLUSH_MS:-500}
      BATCH_MAX_ROWS: ${BATCH_MAX_ROWS:-2000}
      LEADER_LOCK_TTL_S: ${LEADER_LOCK_TTL_S:-10}
      LEADER_REFRESH_S: ${LEADER_REFRESH_S:-3.0}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    deploy:
      replicas: 2
    networks: [fleet]
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; urllib.request.urlopen('http://localhost:8000/health',timeout=2); sys.exit(0)"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 15s

  web:
    image: fleet-web:local
    build:
      context: ..
      dockerfile: docker/web.Dockerfile
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "8080:80"
    networks: [fleet]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ >/dev/null"]
      interval: 10s
      timeout: 3s
      retries: 5

networks:
  fleet:
    driver: bridge

volumes:
  pg_data: {}

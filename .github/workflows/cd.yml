name: CD

# Triggers only when the CI workflow completes successfully on main.
# This guarantees CD never runs on a broken build.
on:
  workflow_run:
    workflows: ["CI"]
    branches: [main]
    types: [completed]

jobs:
  # ── Deploy to AWS ──────────────────────────────────────────────────────────
  #
  # Required GitHub secrets (Settings → Secrets and variables → Actions):
  #   AWS_ACCESS_KEY_ID      — IAM user / role access key
  #   AWS_SECRET_ACCESS_KEY  — IAM user / role secret
  #
  # Required GitHub variables (Settings → Secrets and variables → Variables):
  #   AWS_REGION             — target region, e.g. eu-west-1
  #
  # IAM permissions needed by the deploy user:
  #   Attach AdministratorAccess for initial setup; scope down to
  #   CloudFormation, ECR, ECS, Lambda, S3, CloudFront, IAM, Kinesis,
  #   RDS, Secrets Manager, IoT, and Events once the platform is stable.
  #
  # One-time prerequisites (run locally before the very first deploy):
  #   cd infra && npx cdk bootstrap
  #   aws secretsmanager create-secret \
  #     --name iot-platform/knmi-api-key \
  #     --secret-string "YOUR_KNMI_KEY"
  # ─────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to AWS
    runs-on: ubuntu-latest
    # Only run when CI succeeded — skip on failure or cancellation
    if: github.event.workflow_run.conclusion == 'success'
    environment: production
    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION || 'eu-west-1' }}

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install CDK deps
        run: npm install
        working-directory: infra

      - name: CDK deploy — all stacks
        run: |
          npm run build
          npx cdk deploy --all \
            --require-approval never \
            --ci \
            --outputs-file ../cdk-outputs.json
        working-directory: infra

      - name: Read CDK outputs
        id: outputs
        run: |
          API_URL=$(jq -r '."IoT-ComputeStack".ApiUrl // empty' cdk-outputs.json)
          BUCKET=$(jq -r '."IoT-FrontendStack".SiteBucketName // empty' cdk-outputs.json)
          DIST_ID=$(jq -r '."IoT-FrontendStack".DistributionId // empty' cdk-outputs.json)
          echo "api_url=$API_URL"   >> "$GITHUB_OUTPUT"
          echo "bucket=$BUCKET"     >> "$GITHUB_OUTPUT"
          echo "dist_id=$DIST_ID"   >> "$GITHUB_OUTPUT"

      - name: Build frontend
        run: npm ci && npm run build
        working-directory: frontend
        env:
          # Injected at build-time so the SPA knows the ALB endpoint
          VITE_API_URL: ${{ steps.outputs.outputs.api_url }}

      - name: Sync frontend to S3
        run: |
          BUCKET="${{ steps.outputs.outputs.bucket }}"
          # Long-lived assets (hashed filenames) — immutable cache
          aws s3 sync frontend/dist "s3://$BUCKET" \
            --delete \
            --exclude "index.html" \
            --cache-control "public,max-age=31536000,immutable"
          # index.html — always revalidate
          aws s3 cp frontend/dist/index.html "s3://$BUCKET/index.html" \
            --cache-control "no-cache,no-store,must-revalidate"

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id "${{ steps.outputs.outputs.dist_id }}" \
            --paths "/*"

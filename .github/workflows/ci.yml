name: CI

on:
  push:
    branches: [main, "claude/*", "feat/*", "imp/*", "fix/*"]
  pull_request:
    branches: [main]

jobs:
  # ── Python lint + type-check + test (per service) ─────────────────────────
  python:
    name: Python — ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: [api, panel-processor, knmi-poller]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv python install 3.11
      - name: Install deps
        run: uv sync
        working-directory: services/${{ matrix.service }}
      - name: Lint (ruff)
        run: uv run ruff check .
        working-directory: services/${{ matrix.service }}
      - name: Format (black)
        run: uv run black --check .
        working-directory: services/${{ matrix.service }}
      - name: Sort (isort)
        run: uv run isort --check .
        working-directory: services/${{ matrix.service }}
      - name: Type check (mypy)
        run: uv run mypy --strict .
        working-directory: services/${{ matrix.service }}
      - name: Test (pytest)
        run: uv run pytest
        working-directory: services/${{ matrix.service }}

  # ── CDK type-check + synth ────────────────────────────────────────────────
  cdk:
    name: CDK synth
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install deps
        run: npm install
        working-directory: infra
      - name: Build + synth
        run: npm run build && npx cdk synth
        working-directory: infra

  # ── Frontend type-check + build ───────────────────────────────────────────
  frontend:
    name: Frontend build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install deps
        run: npm ci
        working-directory: frontend
      - name: Type check
        run: npm run typecheck
        working-directory: frontend
      - name: Build
        run: npm run build
        working-directory: frontend
